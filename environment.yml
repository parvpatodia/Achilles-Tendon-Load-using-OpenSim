# Reproduce the demo environment:
#   conda env create -f environment.yml
#   conda activate mirai-demo
#   pip install -e .
#   python scripts/download_data.py
#   python scripts/run_all.py
name: mirai-demo
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - "numpy>=1.24,<2"
      - pandas
      - scipy
      - matplotlib
      - scikit-learn
      - torch
      - tqdm
      - pytest
      # Optional Stage 3 cross-check (OpenSim 4.6+ wheel). Comment out if it
      # conflicts with the pinned numpy; Stages 1/2/4 do not need it.
      # - opensim
